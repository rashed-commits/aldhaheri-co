include:
  - path: ./finance/docker-compose.yml
  - path: ./market/docker-compose.yml
  - path: ./realestate/docker-compose.yml
  - path: ./trade/docker-compose.yml

services:
  hub-frontend:
    build:
      context: ./hub/frontend
      dockerfile: Dockerfile
    container_name: hub-frontend
    ports:
      - "4000:4000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  hub-backend:
    build:
      context: ./hub/backend
      dockerfile: Dockerfile
    container_name: hub-backend
    ports:
      - "4001:4001"
    volumes:
      - hub-data:/data
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  hub-data:
