server {
    listen 3003;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok","service":"trade-bot","mode":"shelved"}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
